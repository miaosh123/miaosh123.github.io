ript src="/diabloweb/static/js/5.430d8c5c.chunk.js"></script><script src="/diabloweb/static/js/main.0a18bc0c_v2.chunk.js"></script><!-- 新增：玩完整版按钮（独立逻辑，不修改原JS） -->
<style>
  /* 按钮样式，和页面原有样式对齐 */
  #playFullVersionBtn {
    display: none; /* 默认隐藏 */
    margin-top: 10px;
    padding: 8px 16px;
    font-size: 16px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
  }
  #playFullVersionBtn:hover {
    background-color: #0056b3;
  }
  /* 统一玩共享版按钮样式 */
  button:contains("玩共享版"), button:contains("开始共享版") {
    padding: 8px 16px;
    font-size: 16px;
    background-color: #28a745;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:contains("玩共享版"):hover, button:contains("开始共享版"):hover {
    background-color: #218838;
  }
</style>

<button id="playFullVersionBtn">玩完整版</button>

<script>
  // 等待页面+原JS加载完成
  window.addEventListener('load', async function() {
    const fullBtn = document.getElementById('playFullVersionBtn');
    const shareBtn = document.querySelector('button:contains("玩共享版")') || document.querySelector('button:contains("开始共享版")');
    
    // 1. 按钮位置：放在玩共享版下方
    if (shareBtn) {
      shareBtn.parentNode.insertBefore(fullBtn, shareBtn.nextSibling);
    }

    // 2. 检测IndexedDB中的DIABDAT.MPQ（复用原逻辑，不修改）
    async function checkDIABDATExists() {
      try {
        // 适配原文件的IndexedDB数据库名（通常是diablo_fs或kv）
        const dbName = 'diablo_fs'; 
        const request = indexedDB.open(dbName);
        return new Promise((resolve) => {
          request.onsuccess = function(e) {
            const db = e.target.result;
            const transaction = db.transaction('kv');
            const store = transaction.objectStore('kv');
            const getAllRequest = store.getAllKeys();
            
            getAllRequest.onsuccess = function() {
              const keys = getAllRequest.result;
              // 检查是否有DIABDAT.MPQ（不区分大小写）
              const hasDIABDAT = keys.some(key => 
                key && key.toLowerCase() === 'diabdat.mpq'
              );
              fullBtn.style.display = hasDIABDAT ? 'block' : 'none';
              resolve(hasDIABDAT);
            };
            db.close();
          };
          request.onerror = function() {
            resolve(false); // 无数据库则返回false
          };
        });
      } catch (err) {
        console.log("检测DIABDAT失败：", err);
        return false;
      }
    }

    // 初始化检测（页面加载后执行）
    await checkDIABDATExists();

    // 3. 监听文件拖放上传（检测DIABDAT.MPQ上传）
    document.addEventListener('drop', async function(e) {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.name.match(/^diabdat\.mpq$/i)) {
        // 上传成功后刷新检测
        setTimeout(async () => {
          await checkDIABDATExists();
          alert("DIABDAT.MPQ上传成功！现在可点击“玩完整版”按钮");
        }, 1000);
      }
    }, true);

    // 4. 玩完整版按钮点击逻辑（模拟原拖拽启动）
    fullBtn.addEventListener('click', async function() {
      const hasDIABDAT = await checkDIABDATExists();
      if (!hasDIABDAT) {
        alert("请先拖拽上传DIABDAT.MPQ文件到页面！");
        return;
      }

      try {
        // 模拟原文件的“拖拽DIABDAT.MPQ启动完整版”逻辑
        // 核心：触发原文件的drop事件，传入DIABDAT.MPQ
        const mockEvent = new Event('drop', { bubbles: true, cancelable: true });
        mockEvent.dataTransfer = {
          files: [new File([''], 'DIABDAT.MPQ', { type: 'application/octet-stream' })]
        };
        document.dispatchEvent(mockEvent);

        alert("正在启动完整版游戏，请稍候...");
      } catch (err) {
        console.error("启动完整版失败：", err);
        alert("启动失败，请重试！");
      }
    });
  });
</script></body></html>
